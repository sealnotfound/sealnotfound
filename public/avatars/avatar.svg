<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#3f3f46"/>
      <stop offset="100%" stop-color="#18181b"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="40" cy="40" r="40" fill="url(#bg)"/>

  <!-- Seal body -->
  <ellipse cx="40" cy="50" rx="16" ry="12" fill="#a1a1aa"/>
  <!-- Seal head -->
  <ellipse cx="40" cy="34" rx="12" ry="11" fill="#a1a1aa"/>
  <!-- Snout -->
  <ellipse cx="40" cy="41" rx="5" ry="3.5" fill="#d4d4d8"/>
  <!-- Eyes -->
  <circle cx="35.5" cy="31.5" r="2.5" fill="#18181b"/>
  <circle cx="44.5" cy="31.5" r="2.5" fill="#18181b"/>
  <!-- Eye shine -->
  <circle cx="36.3" cy="30.8" r="0.8" fill="white"/>
  <circle cx="45.3" cy="30.8" r="0.8" fill="white"/>
  <!-- Nose -->
  <ellipse cx="40" cy="39.5" rx="1.8" ry="1.2" fill="#3f3f46"/>
  <!-- Whiskers left -->
  <line x1="34" y1="40" x2="26" y2="38.5" stroke="#71717a" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="34" y1="41.5" x2="26" y2="41.5" stroke="#71717a" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Whiskers right -->
  <line x1="46" y1="40" x2="54" y2="38.5" stroke="#71717a" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="46" y1="41.5" x2="54" y2="41.5" stroke="#71717a" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Flippers -->
  <ellipse cx="27" cy="54" rx="6" ry="3.5" fill="#71717a" transform="rotate(-20 27 54)"/>
  <ellipse cx="53" cy="54" rx="6" ry="3.5" fill="#71717a" transform="rotate(20 53 54)"/>
  <!-- Tail -->
  <ellipse cx="40" cy="63" rx="8" ry="4" fill="#71717a"/>
  <ellipse cx="33" cy="65" rx="5" ry="2.5" fill="#71717a" transform="rotate(-15 33 65)"/>
  <ellipse cx="47" cy="65" rx="5" ry="2.5" fill="#71717a" transform="rotate(15 47 65)"/>

  <!-- Amber ring -->
  <circle cx="40" cy="40" r="38" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
</svg>
